# ~/.tmux.conf

# --- Prefix -----------------------------------------------------------------
# C-a is closer than C-b. Keep C-b too so muscle memory still works.
set -g prefix C-a
bind C-a send-prefix
# (uncomment the next line to also keep the default)
# set -g prefix2 C-b

# --- General ----------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 10
set -g focus-events on
set -g mouse on
setw -g mode-keys vi
setw -g monitor-activity on
set -g visual-activity off

# --- Splits in current path -------------------------------------------------
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# --- Vim-style pane navigation ----------------------------------------------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize with prefix + H/J/K/L
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Reload config quickly.
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# Copy mode like vim.
bind Escape copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# --- Status bar -------------------------------------------------------------
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=default,fg=white"
set -g status-left-length 40
set -g status-right-length 80
set -g status-left  "#[fg=green,bold] #S #[fg=white]│ "
set -g status-right "#[fg=cyan]#(whoami)@#h #[fg=white]│ #[fg=yellow]%Y-%m-%d #[fg=green]%H:%M "

setw -g window-status-format         " #I:#W "
setw -g window-status-current-format "#[fg=black,bg=green,bold] #I:#W "
