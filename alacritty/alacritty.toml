# Alacritty config — Tokyo Night + transparency rice

[window]
opacity = 0.88
blur = true
padding = { x = 12, y = 10 }
decorations = "buttonless"
dynamic_padding = false

[font]
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold = { family = "JetBrainsMono Nerd Font", style = "Bold" }
italic = { family = "JetBrainsMono Nerd Font", style = "Italic" }
bold_italic = { family = "JetBrainsMono Nerd Font", style = "Bold Italic" }
size = 13.0

[font.offset]
x = 0
y = 4

[font.glyph_offset]
x = 0
y = 2

[cursor]
style = { shape = "Block", blinking = "On" }
blink_interval = 600
unfocused_hollow = true

[scrolling]
history = 10000
multiplier = 3

# ── Tokyo Night ──────────────────────────────────────────────────────────────
[colors.primary]
background = "#1a1b26"
foreground = "#c0caf5"

[colors.cursor]
text   = "#1a1b26"
cursor = "#c0caf5"

[colors.vi_mode_cursor]
text   = "#1a1b26"
cursor = "#bb9af7"

[colors.search.matches]
foreground = "#1a1b26"
background = "#7aa2f7"

[colors.search.focused_match]
foreground = "#1a1b26"
background = "#ff9e64"

[colors.footer_bar]
background = "#16161e"
foreground = "#c0caf5"

[colors.hints.start]
foreground = "#1a1b26"
background = "#e0af68"

[colors.hints.end]
foreground = "#1a1b26"
background = "#7aa2f7"

[colors.selection]
text       = "#c0caf5"
background = "#283457"

[colors.normal]
black   = "#15161e"
red     = "#f7768e"
green   = "#9ece6a"
yellow  = "#e0af68"
blue    = "#7aa2f7"
magenta = "#bb9af7"
cyan    = "#7dcfff"
white   = "#a9b1d6"

[colors.bright]
black   = "#414868"
red     = "#f7768e"
green   = "#9ece6a"
yellow  = "#e0af68"
blue    = "#7aa2f7"
magenta = "#bb9af7"
cyan    = "#7dcfff"
white   = "#c0caf5"

[colors.indexed_colors]
# Tokyo Night extra accents
# orange
[[colors.indexed_colors]]
index = 16
color = "#ff9e64"
# pink
[[colors.indexed_colors]]
index = 17
color = "#ff007c"

# ── Key bindings ─────────────────────────────────────────────────────────────
[[keyboard.bindings]]
key   = "Return"
mods  = "Super|Shift"
action = "SpawnNewInstance"

[[keyboard.bindings]]
key   = "K"
mods  = "Control|Shift"
action = "ScrollPageUp"

[[keyboard.bindings]]
key   = "J"
mods  = "Control|Shift"
action = "ScrollPageDown"

[[keyboard.bindings]]
key   = "C"
mods  = "Control|Shift"
action = "Copy"

[[keyboard.bindings]]
key   = "V"
mods  = "Control|Shift"
action = "Paste"

[[keyboard.bindings]]
key   = "Plus"
mods  = "Control"
action = "IncreaseFontSize"

[[keyboard.bindings]]
key   = "Minus"
mods  = "Control"
action = "DecreaseFontSize"

[[keyboard.bindings]]
key   = "Key0"
mods  = "Control"
action = "ResetFontSize"
